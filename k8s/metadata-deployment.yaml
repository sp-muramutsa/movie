apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metadata
  template:
    metadata:
      labels:
        app: metadata
    spec:
      containers:
      - name: metadata
        image: metadata:v3
        imagePullPolicy: Never
        ports:
          - containerPort: 8081
        env:
          - name: JAEGER_AGENT_HOST
            value: "jaeger"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
