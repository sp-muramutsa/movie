apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metadata
  template:
    metadata:
      labels:
        app: metadata
    spec:
      containers:
      - name: metadata
        image: metadata:v3
        imagePullPolicy: Never
        ports:
          - containerPort: 8081
        env:
          - name: JAEGER_AGENT_HOST
            value: "jaeger"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
---
apiVersion: v1
kind: Service
metadata:
  name: metadata
  namespace: default
spec:
  selector:
    app: metadata
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8081
    - name: metrics
      protocol: TCP
      port: 8091
      targetPort: 8091
  type: ClusterIP
