# Prometheus Configuration, Deployment, and Service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
          scheme: http
          follow_redirects: true
          enable_http2: true
          timeout: 10s
          api_version: v2

    rule_files:
      - /etc/prometheus/alerts.rules

    scrape_configs:
      - job_name: 'prometheus'
        honor_timestamps: true
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        follow_redirects: true
        enable_http2: true
        static_configs:
          - targets: ['prometheus:8091']

      - job_name: 'services'
        honor_timestamps: true
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        follow_redirects: true
        enable_http2: true
        static_configs:
          - targets: ['metadata.default.svc.cluster.local:8091']
            labels:
              service: metadata
          - targets: ['rating.default.svc.cluster.local:8091']
            labels:
              service: rating
          - targets: ['movie.default.svc.cluster.local:8091']
            labels:
              service: movie

  alerts.rules: |
    groups:
    - name: Service availability
      rules:
      - alert: Metadata service down
        expr: up{service="metadata"} == 0
        labels:
          severity: warning
        annotations:
          title: Metadata service is down
          description: Failed to scrape {{ $labels.service }}. Service possibly down.
      - alert: Rating service down
        expr: up{service="rating"} == 0
        labels:
          severity: warning
        annotations:
          title: Rating service is down
          description: Failed to scrape {{ $labels.service }} service on {{ $labels.instance }}. Service possibly down.
      - alert: Movie service down
        expr: up{service="movie"} == 0
        labels:
          severity: warning
        annotations:
          title: Movie service is down
          description: Failed to scrape {{ $labels.service }} service on {{ $labels.instance }}. Service possibly down.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
              - key: alerts.rules
                path: alerts.rules
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 8091
      targetPort: 9090
  type: ClusterIP