apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rating
  template:
    metadata:
      labels:
        app: rating
    spec:
      containers:
        - name: rating
          image: rating:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: JAEGER_AGENT_HOST
              value: "jaeger"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
---
apiVersion: v1
kind: Service
metadata:
  name: rating
  namespace: default
spec:
  selector:
    app: rating
  ports:
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082
    - name: metrics
      protocol: TCP
      port: 8091
      targetPort: 8091
  type: ClusterIP
